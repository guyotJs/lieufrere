<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>JS Bin</title>
  <link rel="stylesheet" href="https://guyotjs.github.io/bcss/bc.css">
  <style>
  /* The flip box container - set the width and height to whatever you want. We have added the border property to demonstrate that the flip itself goes out of the box on hover (remove perspective if you don't want the 3D effect */
.flip-box {
  background-color: transparent;
  width: 300px;
  height: 200px;
  perspective: 1000px; /* Remove this if you don't want the 3D effect */
}
.slide-off{
    animation: slideoff 1s ease-out;
    animation-fill-mode: forwards;
}
.novo{
    animation: novo 1s ease-out;
    animation-fill-mode: forwards;
}

/* This container is needed to position the front and back side */
.flip-box-inner {
  position: relative;
  width: 100%;
  height: 100%;
  text-align: center;
  transition: transform 0.8s;
  transform-style: preserve-3d;
}
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=IM+Fell+English:ital@0;1&display=swap');

@keyframes slideoff{
  from{opacity:1;left:50%;}
  to{opacity:0;left:-10%;}
}
@keyframes novo{
  from{opacity:0;left:50%;}
  to{opacity:1;left:50%;}
}
.pre-lev{
  box-shadow: 0px 0px 12px rgba(0,0,0,0.1), 4px 4px 12px rgba(0,0,0,0.1);
}
/* Do an horizontal flip when you move the mouse over the flip box container */
.flip-box:hover .flip-box-inner {
  transform: rotateY(180deg);
}
.flue{    font-family: 'Playfair Display', Georgia, serif;
  color:#2D2D2D;
}

.relative{
  position:relative;
}
/* Position the front and back side */
.flip-box-front, .flip-box-back {
  position: absolute;
  width: 100%;
  height: 100%;
  -webkit-backface-visibility: hidden; /* Safari */
  backface-visibility: hidden;
}

/* Style the front side */
.flip-box-front {
  color: black;
}

/* Style the back side */
.flip-box-back {
  color: black;
  transform: rotateY(180deg);
}
  </style>
</head>
<body data="{waiting:false, cards:undefined, number:0}">
  
  <p class="p-xl text-center italic flue" if="number==0">Click anywhere to continue!</p>
  
   <div id="box" class="flip-box true-center">
    <div class="flip-box-inner">
      <div class="flip-box-front pre-lev relative">
        <h2 class="true-center f-xl" react>{{cards[number][0]}}</h2>
      </div>
      <div class="flip-box-back pre-lev relative">
        <h2 class="true-center flue" react>{{cards[number][1]}}</h2>
      </div>
    </div>
  </div>
  
  <script src='https://snojs.github.io/sno/crystal.js'></script>
  <script>
    
    
    const box = document.getElementById("box");
    data.waiting = false;
    data.cards = [["🍓", "le fraga"],["🍎", "le malo"],["🍌", "le banana"],["🥖", "le pan"],["👋", "hallo!"]];
    window.addEventListener('click',(()=>{
      if(!data.waiting&&data.number<data.cards.length-1){
        box.classList.add("slide-off");
        data.waiting = true;
        setTimeout((()=>{
          data.number+=1;
          box.classList.add("novo");
          setTimeout(()=>{
            box.classList.remove("slide-off");
            box.classList.remove("novo");
            data.waiting = false;
          },1000);
        }),1000);
      }else if(data.number==data.cards.length-1){
        alert("Deck complete!")
      }
    }));
    
  </script>
</body>
</html>
