<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Card Array Builder</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=IM+Fell+English:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #b8860b;
    --gold-light: #d4a017;
    --gold-dim: #7a5a08;
    --bg: #0f0e0c;
    --bg2: #181610;
    --bg3: #211f19;
    --border: #2e2a20;
    --border-gold: #3d3418;
    --text: #e8e0cc;
    --text-dim: #9e9070;
    --text-muted: #5a5240;
    --danger: #8b2020;
    --danger-light: #c04040;
    --success: #1a6b3a;
    --success-light: #2eaa60;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IM Fell English', Georgia, serif;
    min-height: 100vh;
    padding: 2rem 1rem 4rem;
  }

  /* Header */
  header {
    text-align: center;
    margin-bottom: 2.5rem;
    padding-bottom: 1.5rem;
    border-bottom: 1px solid var(--border-gold);
    position: relative;
  }
  header::after {
    content: '';
    display: block;
    width: 80px;
    height: 1px;
    background: var(--gold);
    margin: 0.6rem auto 0;
    opacity: 0.5;
  }
  h1 {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    color: var(--gold);
    letter-spacing: 0.03em;
    font-weight: 600;
  }
  .subtitle {
    color: var(--text-dim);
    font-style: italic;
    font-size: 0.9rem;
    margin-top: 0.3rem;
  }

  /* Main layout */
  .app {
    max-width: 860px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 2rem;
  }

  /* Section labels */
  .section-label {
    font-family: 'Playfair Display', serif;
    font-size: 0.75rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--gold-dim);
    margin-bottom: 0.75rem;
  }

  /* Add row form */
  .add-panel {
    background: var(--bg2);
    border: 1px solid var(--border-gold);
    border-radius: 4px;
    padding: 1.4rem 1.5rem;
  }

  .fields-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
    margin-bottom: 1rem;
  }

  .field-group {
    display: flex;
    flex-direction: column;
    gap: 0.35rem;
  }

  .field-group label {
    font-size: 0.78rem;
    color: var(--text-dim);
    letter-spacing: 0.06em;
    font-style: italic;
  }

  .field-group input[type="text"] {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--text);
    font-family: 'IM Fell English', serif;
    font-size: 0.95rem;
    padding: 0.45rem 0.65rem;
    outline: none;
    transition: border-color 0.15s;
    width: 100%;
  }
  .field-group input[type="text"]:focus {
    border-color: var(--gold-dim);
  }
  .field-group input[type="text"]::placeholder {
    color: var(--text-muted);
    font-style: italic;
  }

  .subtext-toggle {
    display: flex;
    align-items: center;
    gap: 0.45rem;
    margin-top: 0.35rem;
    cursor: pointer;
    user-select: none;
  }
  .subtext-toggle input[type="checkbox"] {
    accent-color: var(--gold);
    width: 14px;
    height: 14px;
    cursor: pointer;
  }
  .subtext-toggle span {
    font-size: 0.76rem;
    color: var(--text-muted);
    font-style: italic;
  }
  .subtext-toggle input:checked + span {
    color: var(--gold-dim);
  }

  .subtext-input {
    margin-top: 0.35rem;
    overflow: hidden;
    max-height: 0;
    transition: max-height 0.2s ease;
  }
  .subtext-input.open {
    max-height: 60px;
  }
  .subtext-input input {
    background: var(--bg);
    border: 1px dashed var(--border);
    border-radius: 3px;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
    padding: 0.38rem 0.6rem;
    outline: none;
    width: 100%;
    transition: border-color 0.15s;
  }
  .subtext-input input:focus {
    border-color: var(--gold-dim);
  }
  .subtext-input input::placeholder {
    color: var(--text-muted);
  }

  .add-btn {
    background: var(--gold-dim);
    border: 1px solid var(--gold);
    border-radius: 3px;
    color: var(--bg);
    cursor: pointer;
    font-family: 'Playfair Display', serif;
    font-size: 0.88rem;
    font-weight: 600;
    letter-spacing: 0.06em;
    padding: 0.5rem 1.4rem;
    transition: background 0.15s, color 0.15s;
  }
  .add-btn:hover {
    background: var(--gold);
  }

  /* Table */
  .table-wrap {
    background: var(--bg2);
    border: 1px solid var(--border-gold);
    border-radius: 4px;
    overflow: hidden;
  }

  .table-empty {
    text-align: center;
    padding: 2.5rem;
    color: var(--text-muted);
    font-style: italic;
    font-size: 0.9rem;
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  thead th {
    background: var(--bg3);
    border-bottom: 1px solid var(--border-gold);
    color: var(--gold-dim);
    font-family: 'Playfair Display', serif;
    font-size: 0.72rem;
    font-weight: 400;
    letter-spacing: 0.12em;
    padding: 0.65rem 0.9rem;
    text-align: left;
    text-transform: uppercase;
  }
  thead th:last-child { text-align: center; width: 48px; }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--bg3); }

  td {
    padding: 0.6rem 0.9rem;
    vertical-align: top;
    font-size: 0.92rem;
  }

  td .main-text {
    color: var(--text);
  }
  td .sub-text {
    color: var(--text-dim);
    font-size: 0.78rem;
    font-style: italic;
    margin-top: 0.15rem;
  }

  td:last-child {
    text-align: center;
    vertical-align: middle;
  }

  .del-btn {
    background: none;
    border: 1px solid var(--danger);
    border-radius: 3px;
    color: var(--danger-light);
    cursor: pointer;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    padding: 0.2rem 0.5rem;
    transition: background 0.12s, color 0.12s;
  }
  .del-btn:hover {
    background: var(--danger);
    color: #fff;
  }

  /* Output */
  .output-panel {
    background: var(--bg2);
    border: 1px solid var(--border-gold);
    border-radius: 4px;
    overflow: hidden;
  }

  .output-header {
    background: var(--bg3);
    border-bottom: 1px solid var(--border-gold);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.6rem 1rem;
  }

  .output-header span {
    color: var(--gold-dim);
    font-size: 0.72rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-family: 'Playfair Display', serif;
  }

  .copy-btn {
    background: none;
    border: 1px solid var(--border-gold);
    border-radius: 3px;
    color: var(--text-dim);
    cursor: pointer;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    padding: 0.25rem 0.7rem;
    transition: all 0.15s;
  }
  .copy-btn:hover {
    border-color: var(--gold-dim);
    color: var(--gold);
  }
  .copy-btn.copied {
    border-color: var(--success-light);
    color: var(--success-light);
  }

  pre {
    padding: 1rem 1.1rem;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
    line-height: 1.7;
    color: #c8bfa0;
    white-space: pre;
    overflow-x: auto;
  }

  /* Syntax highlight colors */
  .s-kw  { color: #c792ea; }
  .s-id  { color: #82aaff; }
  .s-op  { color: #89ddff; }
  .s-str { color: #c3e88d; }
  .s-tag { color: var(--gold-dim); }
  .s-pun { color: var(--text-dim); }

  @media (max-width: 560px) {
    .fields-grid { grid-template-columns: 1fr; }
    h1 { font-size: 1.5rem; }
  }
</style>
</head>
<body>

<header>
  <h1>Card Array Builder</h1>
  <p class="subtitle">Compose <code style="font-family:JetBrains Mono,monospace;font-size:0.8em;color:var(--gold-dim)">data.cards</code> entries with optional subtext</p>
</header>

<div class="app">

  <!-- ADD PANEL -->
  <div>
    <div class="section-label">Add Entry</div>
    <div class="add-panel">
      <div class="fields-grid">
        <!-- Col A -->
        <div class="field-group">
          <label>Column A (term / word)</label>
          <input type="text" id="colA" placeholder="e.g. tentar" autocomplete="off">
          <label class="subtext-toggle">
            <input type="checkbox" id="subA-toggle" onchange="toggleSub('A')">
            <span>add subtext</span>
          </label>
          <div class="subtext-input" id="subA-wrap">
            <input type="text" id="subA" placeholder="e.g. eu tento, tu tentas">
          </div>
        </div>
        <!-- Col B -->
        <div class="field-group">
          <label>Column B (definition)</label>
          <input type="text" id="colB" placeholder="e.g. to try" autocomplete="off">
          <label class="subtext-toggle">
            <input type="checkbox" id="subB-toggle" onchange="toggleSub('B')">
            <span>add subtext</span>
          </label>
          <div class="subtext-input" id="subB-wrap">
            <input type="text" id="subB" placeholder="e.g. eu tento, tu tentas">
          </div>
        </div>
      </div>
      <button class="add-btn" onclick="addRow()">+ Add Row</button>
    </div>
  </div>

  <!-- TABLE -->
  <div>
    <div class="section-label">Entries</div>
    <div class="table-wrap">
      <div class="table-empty" id="empty-msg">No entries yet. Add one above.</div>
      <table id="entry-table" style="display:none">
        <thead>
          <tr>
            <th>Column A</th>
            <th>Column B</th>
            <th>✕</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>

  <!-- OUTPUT -->
  <div>
    <div class="section-label">Generated Code</div>
    <div class="output-panel">
      <div class="output-header">
        <span>data.cards = [ … ]</span>
        <button class="copy-btn" id="copy-btn" onclick="copyCode()">copy</button>
      </div>
      <pre id="output">data.cards = [];</pre>
    </div>
  </div>

</div>

<script>
  const rows = [];

  function toggleSub(col) {
    const wrap = document.getElementById(`sub${col}-wrap`);
    const chk  = document.getElementById(`sub${col}-toggle`);
    wrap.classList.toggle('open', chk.checked);
    if (!chk.checked) document.getElementById(`sub${col}`).value = '';
  }

  function addRow() {
    const a    = document.getElementById('colA').value.trim();
    const b    = document.getElementById('colB').value.trim();
    const subA = document.getElementById('subA-toggle').checked
                   ? document.getElementById('subA').value.trim() : '';
    const subB = document.getElementById('subB-toggle').checked
                   ? document.getElementById('subB').value.trim() : '';

    if (!a && !b) return;

    rows.push({ a, b, subA, subB });
    renderTable();
    renderOutput();

    // Reset
    ['colA','colB','subA','subB'].forEach(id => document.getElementById(id).value = '');
    ['subA-toggle','subB-toggle'].forEach(id => document.getElementById(id).checked = false);
    ['subA-wrap','subB-wrap'].forEach(id => document.getElementById(id).classList.remove('open'));
    document.getElementById('colA').focus();
  }

  function deleteRow(i) {
    rows.splice(i, 1);
    renderTable();
    renderOutput();
  }

  function renderTable() {
    const tbody = document.getElementById('tbody');
    const empty = document.getElementById('empty-msg');
    const table = document.getElementById('entry-table');

    tbody.innerHTML = '';
    if (rows.length === 0) {
      empty.style.display = '';
      table.style.display = 'none';
      return;
    }
    empty.style.display = 'none';
    table.style.display = '';

    rows.forEach((r, i) => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>
          <div class="main-text">${esc(r.a)}</div>
          ${r.subA ? `<div class="sub-text">${esc(r.subA)}</div>` : ''}
        </td>
        <td>
          <div class="main-text">${esc(r.b)}</div>
          ${r.subB ? `<div class="sub-text">${esc(r.subB)}</div>` : ''}
        </td>
        <td><button class="del-btn" onclick="deleteRow(${i})">✕</button></td>
      `;
      tbody.appendChild(tr);
    });
  }

  function buildValue(main, sub) {
    if (sub) return `${main},<br/><span class='f-xs'>${sub}</span>`;
    return main;
  }

  function renderOutput() {
    const pre = document.getElementById('output');
    if (rows.length === 0) {
      pre.innerHTML = highlight('data.cards = [];');
      return;
    }

    let lines = ['data.cards = ['];
    rows.forEach(r => {
      const va = buildValue(r.a, r.subA);
      const vb = buildValue(r.b, r.subB);
      lines.push(`        ["${va}", "${vb}"],`);
    });
    lines.push('    ];');

    pre.innerHTML = lines.map(highlight).join('\n');
  }

  function highlight(line) {
    // Very lightweight syntax colouring for the specific pattern
    return line
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      // Already escaped — undo just for highlighting tags inside strings
      .replace(/(data\.cards)/g, '<span class="s-id">$1</span>')
      .replace(/(\s*=\s*)/g, '<span class="s-op">$1</span>')
      .replace(/(\[(?!\[)|\](?!\]))/g, '<span class="s-pun">$1</span>')
      .replace(/"([^"]*)"/g, (_, inner) => {
        // colour html-ish parts inside strings
        const coloured = inner
          .replace(/(&lt;[^&]*&gt;)/g, '<span class="s-tag">$1</span>')
          .replace(/(&amp;[a-z]+;)/g, '<span class="s-tag">$1</span>');
        return `<span class="s-str">"${coloured}"</span>`;
      });
  }

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function rawCode() {
    if (rows.length === 0) return 'data.cards = [];';
    let lines = ['data.cards = ['];
    rows.forEach(r => {
      const va = buildValue(r.a, r.subA);
      const vb = buildValue(r.b, r.subB);
      lines.push(`        ["${va}", "${vb}"],`);
    });
    lines.push('    ];');
    return lines.join('\n');
  }

  function copyCode() {
    navigator.clipboard.writeText(rawCode()).then(() => {
      const btn = document.getElementById('copy-btn');
      btn.textContent = 'copied ✓';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = 'copy';
        btn.classList.remove('copied');
      }, 1800);
    });
  }

  // Enter key on inputs
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && ['colA','colB','subA','subB'].includes(e.target.id)) addRow();
  });

  renderOutput();
</script>
</body>
</html>
