<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lieufrère</title>
    <link rel="stylesheet" href="https://guyotjs.github.io/bcss/bc.css">
    <link rel="shortcut icon" href="https://guyotjs.github.io/duckclear2.png" type="image/x-icon">
    <style>
        .full-btn{
            width:300px;
        }
        .text{
            /* min-width:300px; */
            max-width:400px;
            text-align: left;
            /* border:1px solid black; */
            animation: fadeDown 0.3s ease-in;
        }
        h1, p em{
            animation: fadeDown 0.3s ease-in;
        }

        sub{
            animation: fadeDown 0.5s ease-in;
        }
        .hover-shadow:hover{
            box-shadow:0px 0px 10px rgba(0, 0, 0, 0.277);
        }
        button{
            animation: fadeUp 0.3s ease-in;
        }
        #next{
            position:absolute;
        }
        .small-btn{
            width: 143px;
        }
        a{
            all:unset;
        }
        .bring-back{
            /* transform: translate(calc(-50% - 5px)); */
            background-color: rgba(0, 0, 0, 0.11);
        }
        @keyframes fadeUp{
            from { opacity:0; transform:translateY(14px); } 
            to { opacity:1; transform:none; } 
        }
        @keyframes fadeDown{ 
            from { opacity:0; transform:translateY(-10px); } 
            to { opacity:1; transform:none; } 
        }

    </style>
</head>
<body>
    <div class="true-center container">
        <h1 class="sans no-bold">Lieufrère - Português</h1>
        <p><em class="gray">Learn Languages, Free, Forever.</em></p>
        <br>
        <div class="text-center">
            <a href="./licoes/lc1.html"><button class="no-border bring-back full-btn black p m r hover-shadow">Lição Um - Verbos</button></a><br>
            <a href="./licoes/lc2.html"><button class="no-border bring-back full-btn black p m r hover-shadow">Segunda Verbos</button></a><br>
        </div>
        <div class="grid-2">
            <p class="text-center">
                <a href="./vocab.html"><button class="no-border bring-back small-btn black p m r hover-shadow">Mais Verbos</button></a>
            </p>
            <p class="text-center">
                <a href="./marcos.html"><button class="no-border bring-back small-btn black p m r hover-shadow">Evangelho de Marcos</button></a>
            </p>
        </div>
    </div>
</body>
</html>
