<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lieufrère - Português</title>
    <link rel="stylesheet" href="https://guyotjs.github.io/bcss/bc.css">
    <link rel="shortcut icon" href="https://guyotjs.github.io/duckclear2.png" type="image/x-icon">
    <style>
        .full-btn{
            width:300px;
        }
        .text{
            /* min-width:300px; */
            max-width:400px;
            text-align: left;
            /* border:1px solid black; */
            animation: fadeDown 0.3s ease-in;
        }
        sub{
            animation: fadeDown 0.5s ease-in;
        }
        .hover-shadow:hover{
            box-shadow:0px 0px 10px rgba(0, 0, 0, 0.277);
        }
        .buttons{
            position: relative;
            animation: fadeUp 0.3s ease-in;
        }
        #next{
            position:absolute;
        }
        .small-btn{
            width: 143px;
        }
        a{
            all:unset;
        }
        .bring-back{
            transform: translate(calc(-50% - 5px));
            background-color: rgba(0, 0, 0, 0.11);
        }
        @keyframes fadeUp{
            from { opacity:0; transform:translateY(14px); } 
            to { opacity:1; transform:none; } 
        }
        @keyframes fadeDown{ 
            from { opacity:0; transform:translateY(-10px); } 
            to { opacity:1; transform:none; } 
        }

    </style>
</head>
<body data="{question:'',subtext:'',options:[],next:false,complete:false}">
    <div class="true-center text-center container" if="!complete">
        <h1 class="sans no-bold text" react>{{question}}</h1>
        <br>
        <sub class="italic" react>{{subtext}}</sub>
        <br/><br>
        <div class="buttons">
            <button onclick="answer(0)" id="one" class="no-border full-btn black p m w-full r hover-shadow" react>{{options[0][0]}}</button><br>
            <button onclick="answer(1)" id="two" class="no-border full-btn black p m w-full r hover-shadow" react>{{options[1][0]}}</button><br>
            <button onclick="answer(2)" id="three" class="no-border full-btn black p m w-full r hover-shadow" react>{{options[2][0]}}</button><br>
            <button onclick="answer(3)" id="four" class="no-border full-btn black p m w-full r hover-shadow" react>{{options[3][0]}}</button><br>
            <button onclick="next()" if="next" id="next" class="no-border bring-back full-btn black p m w-full r hover-shadow">Next Question</button>
        </div>
    </div>
    <div class="true-center container" if="complete">
        <h1 class="sans no-bold">You have completed every question.</h1>
    </div>

    <script>
        let language = JSON.parse(`
        [
            [
                { "g": "Eu ___ uma conta nova no banco ontem.", "e": "I created a new account at the bank yesterday.", "a": ["criei", true], "b": ["criava", false], "c": ["crio", false], "d": ["criarei", false] },
                { "g": "Ela ___ um café pela manhã todos os dias.", "e": "She drinks a coffee every morning.", "a": ["toma", true], "b": ["tomou", false], "c": ["tomava", false], "d": ["tomará", false] },
                { "g": "Eu ___ muito cansado depois do trabalho.", "e": "I was really tired after work.", "a": ["tava", true], "b": ["fui", false], "c": ["serei", false], "d": ["fiquei", false] },
                { "g": "Nós ___ um projeto novo para a empresa.", "e": "We created a new project for the company.", "a": ["criamos", true], "b": ["criemos", false], "c": ["criávamos", false], "d": ["criaremos", false] },
                { "g": "Eu ___ uma reunião importante semana passada.", "e": "I had an important meeting last week.", "a": ["tive", true], "b": ["tinha", false], "c": ["terei", false], "d": ["tenho", false] },
                { "g": "O professor ___ o novo aluno para a turma.", "e": "The teacher introduced the new student to the class.", "a": ["apresentou", true], "b": ["apresentava", false], "c": ["apresenta", false], "d": ["apresentará", false] },
                { "g": "Você já ___ mudar de emprego?", "e": "Have you already considered changing jobs?", "a": ["considerou", true], "b": ["considera", false], "c": ["considerará", false], "d": ["considerava", false] },
                { "g": "Eu ___ um problema sério no trabalho ontem.", "e": "I had a serious problem at work yesterday.", "a": ["tive", true], "b": ["tinha", false], "c": ["terei", false], "d": ["tenho", false] },
                { "g": "Ela ___ dormindo quando eu cheguei.", "e": "She was sleeping when I arrived.", "a": ["tava", true], "b": ["ficava", false], "c": ["foi", false], "d": ["é", false] },
                { "g": "Eles ___ uma solução diferente para o problema.", "e": "They considered a different solution to the problem.", "a": ["consideraram", true], "b": ["consideram", false], "c": ["considerarão", false], "d": ["consideravam", false] },
                { "g": "Eu ___ remédio para a dor de cabeça.", "e": "I took medicine for the headache.", "a": ["tomei", true], "b": ["tomo", false], "c": ["tomava", false], "d": ["tomarei", false] },
                { "g": "Ela ___ um blog sobre culinária brasileira.", "e": "She created a blog about Brazilian cuisine.", "a": ["criou", true], "b": ["cria", false], "c": ["criava", false], "d": ["criará", false] },
                { "g": "Eu me ___ ao diretor da escola.", "e": "I introduced myself to the school principal.", "a": ["apresentei", true], "b": ["apresento", false], "c": ["apresentava", false], "d": ["apresentarei", false] },
                { "g": "Nós ___ muito frio naquele inverno.", "e": "We were very cold that winter.", "a": ["tivemos", true], "b": ["tínhamos", false], "c": ["teremos", false], "d": ["temos", false] },
                { "g": "Você ___ a proposta antes de recusar?", "e": "Did you consider the proposal before refusing?", "a": ["considerou", true], "b": ["considera", false], "c": ["considerava", false], "d": ["vai considerar", false] },
                { "g": "O gerente ___ os resultados na reunião.", "e": "The manager presented the results at the meeting.", "a": ["apresentou", true], "b": ["apresenta", false], "c": ["apresentava", false], "d": ["apresentará", false] },

                { "g": "Ela ___ uma ideia interessante para o projeto.", "e": "She had an interesting idea for the project.", "a": ["teve", true], "b": ["tinha", false], "c": ["terá", false], "d": ["tem", false] },
                { "g": "Nós vamos ___ nosso trabalho na conferência.", "e": "We are going to present our work at the conference.", "a": ["apresentar", true], "b": ["apresentamos", false], "c": ["apresentando", false], "d": ["apresentado", false] }

    <script>
        let german = language[0];
        let currentQuestion = 0;
        let qElements = [document.getElementById("one"),document.getElementById("two"),document.getElementById("three"),document.getElementById("four")];
        for(let i=0;i<4;i++){
            qElements[i].style.backgroundColor = "rgba(239, 239, 239)";
            qElements[i].style.color = "black"; 
        }
        function newQuestion(){
            let loc = german[currentQuestion];
            data.question = loc.g;
            data.subtext = loc.e;
            data.options = [
                [loc.a[0],loc.a[1]],
                [loc.b[0],loc.b[1]],
                [loc.c[0],loc.c[1]],
                [loc.d[0],loc.d[1]],
            ].sort(()=>Math.random()-0.5);
        }
        function next(){
            data.next = false;
            currentQuestion ++;
            for(let i=0;i<4;i++){
                qElements[i].style.backgroundColor = "rgba(239, 239, 239)";
                qElements[i].style.color = "black"; 
            }
            newQuestion();
        }
        newQuestion();
        function answer(option){
            if(currentQuestion>=german.length){
                data.complete = true;
            }
            let loc = german[currentQuestion];
            let locs = [loc.a,loc.b,loc.c,loc.d];
            for(let i=0;i<4;i++){
                console.log(locs[i][0]+" "+qElements[i].innerText)
                for(let b=0;b<4;b++){
                    if(qElements[i].innerHTML==locs[b][0]&&locs[b][1]){qElements[i].style.backgroundColor = "rgb(131, 204, 131)"}
                }
                qElements[i].style.color = "white"; 
            }
            data.next = true;
        }
    </script>
</body>
</html>
