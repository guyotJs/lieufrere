<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marcos — Evangelho</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #b8860b;
    --gold-light: #d4a017;
    --gold-dim: #7a5c08;
    --ink: #0e0c09;
    --ink-mid: #1c1a15;
    --ink-light: #2a2720;
    --parchment: #f5f0e8;
    --parchment-dim: #e8e0cc;
    --text: #e8e0cc;
    --text-dim: #a09880;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--ink);
    color: var(--text);
    font-family: 'IM Fell English', serif;
    min-height: 100vh;
    padding: 3rem 2rem 6rem;
    position: relative;
    overflow-x: hidden;
  }

  /* Decorative background texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 10%, rgba(184,134,11,0.07) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 90%, rgba(184,134,11,0.05) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .page {
    max-width: 680px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }

  /* Header */
  header {
    text-align: center;
    margin-bottom: 3rem;
    padding-bottom: 2rem;
    border-bottom: 1px solid var(--gold-dim);
    position: relative;
  }

  header::after {
    content: '✦';
    position: absolute;
    bottom: -0.65em;
    left: 50%;
    transform: translateX(-50%);
    background: var(--ink);
    padding: 0 0.5rem;
    color: var(--gold);
    font-size: 0.9rem;
  }

  .book-label {
    font-family: 'Playfair Display', serif;
    font-size: 0.75rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 0.5rem;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: 2.4rem;
    font-weight: 400;
    color: var(--parchment);
    line-height: 1.1;
  }

  h1 em {
    font-style: italic;
    color: var(--gold-light);
  }

  .chapter-label {
    margin-top: 0.5rem;
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: 0.9rem;
    color: var(--text-dim);
  }

  /* Verses */
  .verses {
    display: flex;
    flex-direction: column;
    gap: 1.8rem;
  }

  .verse {
    display: flex;
    gap: 1rem;
    align-items: baseline;
  }

  .verse-num {
    font-family: 'Playfair Display', serif;
    font-size: 0.7rem;
    color: var(--gold);
    letter-spacing: 0.05em;
    min-width: 1.4rem;
    padding-top: 0.25rem;
    flex-shrink: 0;
    user-select: none;
  }

  .verse-text {
    font-size: 1.2rem;
    line-height: 1.85;
    color: var(--parchment-dim);
  }

  /* Word buttons */
  .word {
    background: none;
    border: none;
    color: inherit;
    font: inherit;
    font-size: inherit;
    cursor: pointer;
    padding: 0.05em 0.1em;
    border-radius: 2px;
    position: relative;
    transition: color 0.15s, background 0.15s;
    display: inline;
  }

  .word:hover {
    color: var(--gold-light);
    background: rgba(184,134,11,0.08);
  }

  .word.active {
    color: var(--gold-light);
    background: rgba(184,134,11,0.15);
  }

  /* Popup */
  #popup {
    position: fixed;
    z-index: 100;
    width: 300px;
    background: var(--ink-mid);
    border: 1px solid var(--gold-dim);
    border-radius: 4px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.7), 0 0 0 1px rgba(184,134,11,0.1);
    display: none;
    overflow: hidden;
  }

  #popup.visible {
    display: block;
    animation: popIn 0.15s ease;
  }

  @keyframes popIn {
    from { opacity: 0; transform: translateY(-6px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .popup-header {
    background: var(--ink-light);
    padding: 0.75rem 1rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--gold-dim);
  }

  .popup-word {
    font-family: 'Playfair Display', serif;
    font-size: 1.2rem;
    color: var(--gold-light);
    font-style: italic;
  }

  .popup-close {
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 1rem;
    cursor: pointer;
    line-height: 1;
    padding: 0.1rem 0.3rem;
    border-radius: 2px;
    transition: color 0.15s;
  }

  .popup-close:hover { color: var(--parchment); }

  .popup-body {
    padding: 0.9rem 1rem 1rem;
    font-size: 0.92rem;
    line-height: 1.6;
    color: var(--text);
    min-height: 60px;
  }

  .popup-body.loading {
    color: var(--text-dim);
    font-style: italic;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .spinner {
    width: 14px;
    height: 14px;
    border: 2px solid var(--gold-dim);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    flex-shrink: 0;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .popup-section {
    margin-bottom: 0.6rem;
  }

  .popup-section:last-child { margin-bottom: 0; }

  .popup-label {
    font-family: 'Playfair Display', serif;
    font-size: 0.65rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 0.2rem;
  }

  .popup-value {
    color: var(--parchment);
  }

  .popup-value em {
    font-style: italic;
    color: var(--text-dim);
  }

  /* Footer */
  footer {
    margin-top: 3rem;
    padding-top: 1.5rem;
    border-top: 1px solid var(--ink-light);
    text-align: center;
    font-style: italic;
    font-size: 0.8rem;
    color: var(--text-dim);
  }
</style>
</head>
<body>

<div class="page">
  <header>
    <div class="book-label">Novo Testamento</div>
    <h1>Evangelho de <em>Marcos</em></h1>
    <div class="chapter-label">Capítulo I, Versículos 1–3</div>
  </header>

  <div class="verses" id="insert"></div>

  <footer>Clique em qualquer palavra para ver a tradução e conjugação.</footer>
</div>

<!-- Popup -->
<div id="popup">
  <div class="popup-header">
    <span class="popup-word" id="popup-word"></span>
    <button class="popup-close" onclick="closePopup()">✕</button>
  </div>
  <div class="popup-body" id="popup-body">
    <div class="spinner"></div> A carregar…
  </div>
</div>

<script>
var marcos = [
  [
    "Princípio do evangelho de Jesus Cristo, Filho de Deus.",
    "Conforme está escrito na profecia de Isaías: Eis aí envio diante da tua face o meu mensageiro, o qual preparará o teu caminho;",
    "voz do que clama no deserto: Preparai o caminho do Senhor, endireitai as suas veredas;"
  ]
];

// Split verses into word tokens
for (var i = 0; i < marcos[0].length; i++) {
  marcos[0][i] = marcos[0][i].split(" ");
}

// Render
var container = document.getElementById("insert");
var html = "";
for (var i = 0; i < marcos[0].length; i++) {
  html += `<div class="verse"><span class="verse-num">${i + 1}</span><span class="verse-text">`;
  for (var z = 0; z < marcos[0][i].length; z++) {
    var rawWord = marcos[0][i][z];
    // Escape for attribute use
    var escaped = rawWord.replace(/"/g, '&quot;');
    html += `<button class="word" data-word="${escaped}" onclick="onWordClick(this)">${rawWord}</button> `;
  }
  html += `</span></div>`;
}
container.innerHTML = html;

// Popup state
var activeBtn = null;
var cache = {};

function onWordClick(btn) {
  if (activeBtn && activeBtn !== btn) {
    activeBtn.classList.remove("active");
  }
  activeBtn = btn;
  btn.classList.add("active");

  var word = btn.dataset.word;
  // Strip punctuation for lookup
  var clean = word.replace(/[.,;:!?"""''()\[\]]/g, "");

  showPopup(btn, word, clean);
}

function showPopup(btn, displayWord, cleanWord) {
  var popup = document.getElementById("popup");
  var wordEl = document.getElementById("popup-word");
  var body = document.getElementById("popup-body");

  wordEl.textContent = displayWord;
  body.className = "popup-body loading";
  body.innerHTML = '<div class="spinner"></div> A carregar…';
  popup.classList.add("visible");

  positionPopup(btn);

  if (cache[cleanWord]) {
    renderPopupContent(cache[cleanWord]);
    return;
  }

  fetchWordInfo(cleanWord).then(function(info) {
    cache[cleanWord] = info;
    renderPopupContent(info);
  });
}

function positionPopup(btn) {
  var popup = document.getElementById("popup");
  var rect = btn.getBoundingClientRect();
  var pw = 300;
  var margin = 8;

  var left = rect.left;
  if (left + pw > window.innerWidth - margin) {
    left = window.innerWidth - pw - margin;
  }
  if (left < margin) left = margin;

  var top = rect.bottom + margin + window.scrollY;
  // If too close to bottom, show above
  if (rect.bottom + 180 > window.innerHeight) {
    top = rect.top + window.scrollY - 180 - margin;
  }

  popup.style.left = left + "px";
  popup.style.top = top + "px";
}

function closePopup() {
  document.getElementById("popup").classList.remove("visible");
  if (activeBtn) {
    activeBtn.classList.remove("active");
    activeBtn = null;
  }
}

function renderPopupContent(info) {
  var body = document.getElementById("popup-body");
  body.className = "popup-body";

  var html = "";
  if (info.translation) {
    html += `<div class="popup-section">
      <div class="popup-label">Translation</div>
      <div class="popup-value">${info.translation}</div>
    </div>`;
  }
  if (info.pos) {
    html += `<div class="popup-section">
      <div class="popup-label">Part of Speech</div>
      <div class="popup-value">${info.pos}</div>
    </div>`;
  }
  if (info.conjugation) {
    html += `<div class="popup-section">
      <div class="popup-label">Conjugation / Form</div>
      <div class="popup-value">${info.conjugation}</div>
    </div>`;
  }
  if (!html) {
    html = `<div class="popup-value"><em>No information available.</em></div>`;
  }
  body.innerHTML = html;
}

async function fetchWordInfo(word) {
  if (!word || word.trim() === "") return { translation: "—" };

  const prompt = `You are a Portuguese biblical linguistics assistant. The user clicked the European Portuguese word "${word}" from Mark 1:1-3 (Portuguese Bible).

Return ONLY a JSON object (no markdown, no explanation) with these fields:
- "translation": English translation of this word in context (concise, 1-5 words)
- "pos": part of speech (e.g. "noun, masculine", "verb, 3rd person singular present", "preposition", "article", etc.)
- "conjugation": if it is a verb, give the infinitive and the tense/person/number. If it is a noun or adjective, note its gender and number. If it is a particle/preposition/article, omit this field or set to null.

Example output:
{"translation":"beginning","pos":"noun, masculine singular","conjugation":null}`;

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        messages: [{ role: "user", content: prompt }]
      })
    });
    const data = await response.json();
    const text = data.content.map(b => b.text || "").join("").trim();
    const clean = text.replace(/```json|```/g, "").trim();
    const parsed = JSON.parse(clean);
    return parsed;
  } catch (e) {
    return { translation: "Error fetching data.", pos: null, conjugation: null };
  }
}

// Close popup on outside click
document.addEventListener("click", function(e) {
  var popup = document.getElementById("popup");
  if (popup.classList.contains("visible") &&
      !popup.contains(e.target) &&
      !e.target.classList.contains("word")) {
    closePopup();
  }
});
</script>
</body>
</html>
