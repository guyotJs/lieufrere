<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>Marcos</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=IM+Fell+English:ital@0;1&display=swap');

:root {
  --gold: #b8860b;
  --gold-light: #d4a017;
  --gold-dim: #7a5c08;
  --ink: #0e0c09;
  --ink-mid: #1c1a15;
  --ink-light: #2a2720;
  --parchment: #f5f0e8;
  --parchment-dim: #e8e0cc;
  --text: #e8e0cc;
  --text-dim: #a09880;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--ink);
  color: var(--text);
  font-family: 'IM Fell English', serif;
  min-height: 100vh;
  padding: 3rem 2rem 6rem;
  position: relative;
  overflow-x: hidden;
}

/* Decorative background texture */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse at 20% 10%, rgba(184,134,11,0.07) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 90%, rgba(184,134,11,0.05) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}

.page {
  max-width: 680px;
  margin: 0 auto;
  position: relative;
  z-index: 1;
}

/* Header */
header {
  text-align: center;
  margin-bottom: 3rem;
  padding-bottom: 2rem;
  border-bottom: 1px solid var(--gold-dim);
  position: relative;
}

header::after {
  content: '✦';
  position: absolute;
  bottom: -0.65em;
  left: 50%;
  transform: translateX(-50%);
  background: var(--ink);
  padding: 0 0.5rem;
  color: var(--gold);
  font-size: 0.9rem;
}

.book-label {
  font-family: 'Playfair Display', serif;
  font-size: 0.75rem;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 0.5rem;
}

h1 {
  font-family: 'Playfair Display', serif;
  font-size: 2.4rem;
  font-weight: 400;
  color: var(--parchment);
  line-height: 1.1;
}

h1 em {
  font-style: italic;
  color: var(--gold-light);
}

.chapter-label {
  margin-top: 0.5rem;
  font-family: 'IM Fell English', serif;
  font-style: italic;
  font-size: 0.9rem;
  color: var(--text-dim);
}

/* Verses */
.verses {
  display: flex;
  flex-direction: column;
  gap: 1.8rem;
}

.verse {
  display: flex;
  gap: 1rem;
  align-items: baseline;
}

.verse-num {
  font-family: 'Playfair Display', serif;
  font-size: 0.7rem;
  color: var(--gold);
  letter-spacing: 0.05em;
  min-width: 1.4rem;
  padding-top: 0.25rem;
  flex-shrink: 0;
  user-select: none;
}

.verse-text {
  font-size: 1.2rem;
  line-height: 1.85;
  color: var(--parchment-dim);
}

/* Word buttons */
.word {
  background: none;
  border: none;
  color: inherit;
  font: inherit;
  font-size: inherit;
  cursor: pointer;
  padding: 0.05em 0.1em;
  border-radius: 2px;
  position: relative;
  transition: color 0.15s, background 0.15s;
  display: inline;
}

.word:hover {
  color: var(--gold-light);
  background: rgba(184,134,11,0.08);
}

.word.active {
  color: var(--gold-light);
  background: rgba(184,134,11,0.15);
}

/* Popup */
#popup {
  position: fixed;
  z-index: 100;
  width: 300px;
  background: var(--ink-mid);
  border: 1px solid var(--gold-dim);
  border-radius: 4px;
  box-shadow: 0 8px 40px rgba(0,0,0,0.7), 0 0 0 1px rgba(184,134,11,0.1);
  display: none;
  overflow: hidden;
}

#popup.visible {
  display: block;
  animation: popIn 0.15s ease;
}

@keyframes popIn {
  from { opacity: 0; transform: translateY(-6px) scale(0.97); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

.popup-header {
  background: var(--ink-light);
  padding: 0.75rem 1rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--gold-dim);
}

.popup-word {
  font-family: 'Playfair Display', serif;
  font-size: 1.2rem;
  color: var(--gold-light);
  font-style: italic;
}

.popup-close {
  background: none;
  border: none;
  color: var(--text-dim);
  font-size: 1rem;
  cursor: pointer;
  line-height: 1;
  padding: 0.1rem 0.3rem;
  border-radius: 2px;
  transition: color 0.15s;
}

.popup-close:hover { color: var(--parchment); }

.popup-body {
  padding: 0.9rem 1rem 1rem;
  font-size: 0.92rem;
  line-height: 1.6;
  color: var(--text);
  min-height: 60px;
}

.popup-body.loading {
  color: var(--text-dim);
  font-style: italic;
  display: flex;
  align-items: center;
  gap: 0.5rem;
}

.spinner {
  width: 14px;
  height: 14px;
  border: 2px solid var(--gold-dim);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
  flex-shrink: 0;
}

@keyframes spin { to { transform: rotate(360deg); } }

.popup-section {
  margin-bottom: 0.6rem;
}

.popup-section:last-child { margin-bottom: 0; }

.popup-label {
  font-family: 'Playfair Display', serif;
  font-size: 0.65rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 0.2rem;
}

.popup-value {
  color: var(--parchment);
}

.popup-value em {
  font-style: italic;
  color: var(--text-dim);
}

/* Footer */
footer {
  margin-top: 3rem;
  padding-top: 1.5rem;
  border-top: 1px solid var(--ink-light);
  text-align: center;
  font-style: italic;
  font-size: 0.8rem;
  color: var(--text-dim);
}
  </style>
</head>
<body>

  <div class="page">
    <header>
      <div class="book-label">Novo Testamento</div>
      <h1>Evangelho de <em>Marcos</em></h1>
      <div class="chapter-label">Capítulo I, Versículos 1–3</div>
    </header>

    <div class="verses" id="insert"></div>

    <footer>Clique em qualquer palavra para ver a tradução.</footer>
  </div>

  <!-- Popup -->
  <div id="popup">
    <div class="popup-header">
      <span class="popup-word" id="popup-word"></span>
      <button class="popup-close" onclick="closePopup()">✕</button>
    </div>
    <div class="popup-body" id="popup-body">
      <!-- Your translation content goes here -->
    </div>
  </div>

  <script>
    var marcos = [
      [
        "Princípio do evangelho de Jesus Cristo, Filho de Deus.",
        "Conforme está escrito na profecia de Isaías: Eis aí envio diante da tua face o meu mensageiro, o qual preparará o teu caminho;",
        "voz do que clama no deserto: Preparai o caminho do Senhor, endireitai as suas veredas;"
      ]
    ]
    var body = document.getElementById("insert");

    // Split each verse into each word
    for(var i=0;i<marcos[0].length;i++){
      var currentVerse = marcos[0][i];
      marcos[0][i] = currentVerse.split(" ");
    }

    var finalHTML = "";

    for(var i=0;i<marcos[0].length;i++){
      finalHTML += `<div class="verse"><span class="verse-num">${i+1}</span><span class="verse-text">`;
      for(var z=0;z<marcos[0][i].length;z++){
        var word = marcos[0][i][z];
        finalHTML += `<button class="word" onclick="onWordClick(this)">${word}</button> `;
      }
      finalHTML += `</span></div>`;
    }

    body.innerHTML = finalHTML;

    // --- Popup logic ---
    var activeBtn = null;

    function onWordClick(btn) {
      if (activeBtn && activeBtn !== btn) activeBtn.classList.remove("active");
      activeBtn = btn;
      btn.classList.add("active");

      var word = btn.textContent.replace(/[.,;:!?]/g, "");
      document.getElementById("popup-word").textContent = btn.textContent;

      // Hook your translation data in here:
      var info = getWordInfo(word);
      document.getElementById("popup-body").innerHTML = info;

      var popup = document.getElementById("popup");
      popup.classList.add("visible");
      positionPopup(btn);
    }

    function positionPopup(btn) {
      var popup = document.getElementById("popup");
      var rect = btn.getBoundingClientRect();
      var pw = 300, margin = 8;
      var left = Math.min(rect.left, window.innerWidth - pw - margin);
      if (left < margin) left = margin;
      var top = rect.bottom + margin + window.scrollY;
      if (rect.bottom + 180 > window.innerHeight) top = rect.top + window.scrollY - 180 - margin;
      popup.style.left = left + "px";
      popup.style.top = top + "px";
    }

    function closePopup() {
      document.getElementById("popup").classList.remove("visible");
      if (activeBtn) { activeBtn.classList.remove("active"); activeBtn = null; }
    }

    document.addEventListener("click", function(e) {
      var popup = document.getElementById("popup");
      if (popup.classList.contains("visible") &&
          !popup.contains(e.target) &&
          !e.target.classList.contains("word")) closePopup();
    });

    // --- Your translation data goes here ---
    var dict = [
      "Princípio", ["beginning", "noun, masculine singular"],
      "do", ["of the", "contraction (preposition 'de' + article 'o')"],
      "evangelho", ["gospel", "noun, masculine singular"],
      "de", ["of/from", "preposition"],
      "Jesus", ["Jesus", "noun, masculine singular (proper name)"],
      "Cristo", ["Christ", "noun, masculine singular (proper name)"],
      "Filho", ["Son", "noun, masculine singular"],
      "Deus", ["God", "noun, masculine singular (proper name)"],
      "Conforme", ["as/according to", "conjunction/adverb"],
      "está", ["is", "verb, estar, 3rd person singular present"],
      "escrito", ["written", "verb, escrever, past participle"],
      "na", ["in the", "contraction (preposition 'em' + article 'a')"],
      "profecia", ["prophecy", "noun, feminine singular"],
      "Isaías", ["Isaiah", "noun, masculine singular (proper name)"],
      "Eis", ["behold/here is", "interjection"],
      "aí", ["there", "adverb"],
      "envio", ["I send", "verb, enviar, 1st person singular present"],
      "diante", ["before/in front of", "preposition/adverb"],
      "da", ["of the", "contraction (preposition 'de' + article 'a')"],
      "tua", ["your", "possessive pronoun, feminine singular"],
      "face", ["face", "noun, feminine singular"],
      "o", ["the", "definite article, masculine singular"],
      "meu", ["my", "possessive pronoun, masculine singular"],
      "mensageiro", ["messenger", "noun, masculine singular"],
      "qual", ["which/who", "relative pronoun"],
      "preparará", ["will prepare", "verb, preparar, 3rd person singular future"],
      "teu", ["your", "possessive pronoun, masculine singular"],
      "caminho", ["way/path", "noun, masculine singular"],
      "voz", ["voice", "noun, feminine singular"],
      "que", ["who/that/which", "relative pronoun/conjunction"],
      "clama", ["cries out", "verb, clamar, 3rd person singular present"],
      "no", ["in the", "contraction (preposition 'em' + article 'o')"],
      "deserto", ["desert/wilderness", "noun, masculine singular"],
      "Preparai", ["prepare", "verb, preparar, 2nd person plural imperative"],
      "Senhor", ["Lord", "noun, masculine singular"],
      "endireitai", ["make straight", "verb, endireitar, 2nd person plural imperative"],
      "as", ["the", "definite article, feminine plural"],
      "suas", ["his/its", "possessive pronoun, feminine plural"],
      "veredas", ["paths/ways", "noun, feminine plural"],
    ]
    function getWordInfo(word) {
      var checked = dict.indexOf(word);
      
      // Replace this with your own lookup logic.
      // Return an HTML string to display inside the popup body.
      if(checked == -1){
        return `<div class="popup-section">
          <div class="popup-label">Translation</div>
          <div class="popup-value"><em>— add "${word}" to your dictionary —</em></div>
        </div>`;
      }
      else{
        return `<div class="popup-section">
          <div class="popup-label">Translation</div>
          <div class="popup-value"><em>${dict[checked+1][0]}</em></div>
          <div class="popup-label">Part of Speech</div>
          <div class="popup-value"><em>${dict[checked+1][1]}</em></div>
        </div>`;
      }
    }
  </script>

</body>
</html>
